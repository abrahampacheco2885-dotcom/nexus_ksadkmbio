<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlCambio Nexus - Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f1f5f9; font-family: 'Inter', sans-serif; }
        .app-card { background: white; border-radius: 2.5rem; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.1); }
        .fade-in { animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full app-card border border-slate-100 p-8 fade-in">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-black text-slate-800 tracking-tighter italic">AlCambio <span class="text-blue-600">Nexus</span></h1>
                <p id="status" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Sincronizando...</p>
            </div>
            <button onclick="loadData()" class="w-10 h-10 bg-slate-50 rounded-2xl flex items-center justify-center text-slate-400 hover:text-blue-600 transition-all active:scale-90">
                <i class="fas fa-sync-alt"></i>
            </button>
        </div>

        <div class="bg-slate-50 rounded-3xl p-6 mb-8 border border-slate-100 text-center">
            <p class="text-[10px] font-black text-slate-400 uppercase mb-1">Monto a calcular ($)</p>
            <input type="number" id="usdInput" value="1" step="0.01" class="bg-transparent text-5xl font-black text-slate-800 outline-none w-full text-center">
        </div>

        <div id="results" class="space-y-4">
            </div>

        <p class="mt-8 text-center text-[9px] font-bold text-slate-300 uppercase tracking-widest">Powered by Google Sheets Engine</p>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTkk8NsAx5y6ucnauQnoghjha9l0cRTZgCupYyBjpJ6_yeHF8ZINYJSwzDwKlHyIjr8JCMXVMERZ0hn/pub?gid=0&single=true&output=csv';

        async function loadData() {
            const status = document.getElementById('status');
            try {
                const response = await fetch(CSV_URL);
                const csvText = await response.text();
                
                // Procesar filas del CSV
                const rows = csvText.split('\n').filter(row => row.trim() !== '');
                const dataRows = rows.slice(1); // Ignorar cabecera (Fuente, Precio)

                const rates = dataRows.map(row => {
                    const cols = row.split(',');
                    // Limpiar el precio: manejar comas/puntos y quitar símbolos
                    let priceStr = cols[1] ? cols[1].replace(/[^\d.,]/g, '').replace(',', '.') : "0";
                    return {
                        name: cols[0].trim(),
                        price: parseFloat(priceStr) || 0
                    };
                });

                window.currentRates = rates;
                render();
                status.innerText = "ACTUALIZADO: " + new Date().toLocaleTimeString();
            } catch (error) {
                console.error(error);
                status.innerText = "ERROR DE CONEXIÓN";
            }
        }

        function render() {
            const amount = parseFloat(document.getElementById('usdInput').value) || 0;
            const container = document.getElementById('results');
            if (!window.currentRates) return;

            container.innerHTML = '';
            const icons = ['fa-university', 'fa-euro-sign', 'fa-bolt'];
            const colors = ['blue', 'indigo', 'red'];

            window.currentRates.forEach((item, index) => {
                const total = (amount * item.price).toLocaleString('es-VE', {minimumFractionDigits: 2});
                container.innerHTML += `
                    <div class="flex items-center justify-between p-5 bg-white border border-slate-50 rounded-[2rem] shadow-sm hover:shadow-md transition-all">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-${colors[index] || 'slate'}-500 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-${colors[index] || 'slate'}-100">
                                <i class="fas ${icons[index] || 'fa-money-bill-wave'} text-sm"></i>
                            </div>
                            <div>
                                <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-tighter">${item.name}</h3>
                                <p class="text-[11px] font-bold text-slate-800">Tasa: ${item.price.toFixed(2)}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-xl font-black text-slate-800 leading-none">Bs. ${total}</p>
                        </div>
                    </div>
                `;
            });
        }

        document.getElementById('usdInput').addEventListener('input', render);
        window.onload = loadData;
    </script>
</body>
</html>
