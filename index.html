<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlCambio AI - Nexus Safe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f3f4f6; font-family: 'Inter', sans-serif; }
        .app-card { background: white; border-radius: 32px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full app-card border border-slate-200 p-8">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-black text-slate-800 tracking-tighter">AlCambio <span class="text-blue-600">AI</span></h1>
            <button onclick="clearKey()" class="text-[10px] text-red-500 font-bold uppercase">Borrar Key</button>
        </div>

        <div id="setupView" class="hidden space-y-4 mb-6">
            <p class="text-xs text-slate-500">Pega tu nueva API Key de Google AI Studio:</p>
            <input type="password" id="apiKeyInput" placeholder="AIzaSy..." class="w-full p-3 border rounded-xl text-sm outline-none focus:ring-2 focus:ring-blue-500">
            <button onclick="saveKey()" class="w-full py-3 bg-blue-600 text-white rounded-xl font-bold text-sm">Guardar y Conectar</button>
        </div>

        <div id="mainApp" class="hidden">
            <div class="bg-slate-50 rounded-2xl p-6 mb-6 border border-slate-100">
                <input type="number" id="usdInput" value="1" class="bg-transparent text-4xl font-black text-slate-800 outline-none w-full text-center">
            </div>

            <div id="loading" class="text-center py-10 hidden">
                <i class="fas fa-circle-notch fa-spin text-3xl text-blue-600"></i>
            </div>

            <div id="results" class="space-y-3"></div>

            <button id="refreshBtn" class="w-full mt-6 py-4 bg-slate-800 text-white rounded-2xl font-bold text-xs uppercase tracking-widest">Actualizar con IA</button>
        </div>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        window.saveKey = () => {
            const key = document.getElementById('apiKeyInput').value;
            if(key) {
                localStorage.setItem('gemini_key', key);
                location.reload();
            }
        };

        window.clearKey = () => {
            localStorage.removeItem('gemini_key');
            location.reload();
        };

        const storedKey = localStorage.getItem('gemini_key');
        if (!storedKey) {
            document.getElementById('setupView').classList.remove('hidden');
        } else {
            document.getElementById('mainApp').classList.remove('hidden');
            startApp(storedKey);
        }

        async function startApp(key) {
            const genAI = new GoogleGenerativeAI(key);
            const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
            
            const fetchRates = async () => {
                document.getElementById('loading').classList.remove('hidden');
                document.getElementById('results').innerHTML = '';
                
                try {
                    const prompt = "Dame los precios actuales en Venezuela de: 1.Dólar BCV, 2.Euro BCV, 3.Dólar Paralelo, 4.USDT Binance. Responde UNICAMENTE con un JSON: {'usd':0, 'eur':0, 'par':0, 'bin':0}";
                    const result = await model.generateContent(prompt);
                    const response = await result.response;
                    const text = response.text().replace(/```json|```/g, "").trim();
                    const data = JSON.parse(text);
                    render(data);
                } catch (e) {
                    alert("Error de API. Tu clave puede estar restringida por región o ser inválida.");
                    window.clearKey();
                } finally {
                    document.getElementById('loading').classList.add('hidden');
                }
            };

            const render = (data) => {
                const amount = parseFloat(document.getElementById('usdInput').value) || 0;
                const container = document.getElementById('results');
                const config = [
                    { label: 'Dólar BCV', val: data.usd, c: 'blue' },
                    { label: 'Euro BCV', val: data.eur, c: 'indigo' },
                    { label: 'Paralelo', val: data.par, c: 'red' },
                    { label: 'Binance', val: data.bin, c: 'yellow' }
                ];
                container.innerHTML = config.map(i => `
                    <div class="flex justify-between p-4 bg-white border border-slate-100 rounded-2xl shadow-sm">
                        <span class="text-xs font-bold text-slate-400 uppercase">${i.label}</span>
                        <span class="font-black text-slate-800">Bs. ${(amount * i.val).toLocaleString('es-VE')}</span>
                    </div>
                `).join('');
            };

            document.getElementById('refreshBtn').onclick = fetchRates;
            document.getElementById('usdInput').oninput = () => {}; // Re-render logic here
            fetchRates();
        }
    </script>
</body>
</html>
