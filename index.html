<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlCambio Nexus - Pro Expert</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f1f5f9; font-family: 'Inter', sans-serif; }
        .app-card { background: white; border-radius: 2.5rem; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.1); }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full app-card border border-slate-100 p-8 fade-in">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-2xl font-black text-slate-800 tracking-tighter italic">AlCambio <span class="text-blue-600">Nexus</span></h1>
                <p id="status" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1 italic">Sincronizando...</p>
            </div>
            <button onclick="loadData()" class="w-10 h-10 bg-slate-50 rounded-2xl flex items-center justify-center text-slate-400 hover:text-blue-600 transition-all active:scale-90">
                <i class="fas fa-sync-alt"></i>
            </button>
        </div>

        <div class="bg-slate-50 rounded-[2rem] p-6 mb-6 border border-slate-100 text-center">
            <p class="text-[10px] font-black text-slate-400 uppercase mb-1 tracking-widest">Monto a Entregar (EUR/USD)</p>
            <div class="flex items-center justify-center">
                <span class="text-2xl font-bold text-slate-300 mr-2">$</span>
                <input type="number" id="usdInput" value="100" step="1" class="bg-transparent text-5xl font-black text-slate-800 outline-none w-40 text-center">
            </div>
        </div>

        <div id="nexusAnalysis" class="mb-6 p-5 bg-slate-900 rounded-[2rem] shadow-xl text-white hidden">
            <h2 class="text-[10px] font-black uppercase mb-4 opacity-60 tracking-[0.2em] text-center text-blue-400">Liquidación Final de Cambio</h2>
            <div id="conversionText" class="space-y-4 text-center">
                </div>
        </div>

        <div id="results" class="space-y-3">
            <p class="text-center text-slate-400 py-10 animate-pulse font-bold text-xs uppercase">Conectando con Google Sheets...</p>
        </div>

        <p class="mt-8 text-center text-[9px] font-bold text-slate-300 uppercase tracking-widest italic">Nexus Intelligence Engine v3.0</p>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTkk8NsAx5y6ucnauQnoghjha9l0cRTZgCupYyBjpJ6_yeHF8ZINYJSwzDwKlHyIjr8JCMXVMERZ0hn/pub?gid=0&single=true&output=csv';

        async function loadData() {
            try {
                const response = await fetch(CSV_URL);
                const csvText = await response.text();
                const rows = csvText.split('\n').filter(row => row.trim() !== '');
                const dataRows = rows.slice(1);

                window.currentRates = dataRows.map(row => {
                    const cols = row.split(',');
                    let priceStr = cols[1] ? cols[1].replace(/[^\d.,]/g, '').replace(',', '.') : "0";
                    return { name: cols[0].trim(), price: parseFloat(priceStr) || 0 };
                });

                render();
                document.getElementById('status').innerText = "ACTUALIZADO: " + new Date().toLocaleTimeString();
            } catch (error) {
                document.getElementById('status').innerText = "ERROR DE SYNC";
            }
        }

        function render() {
            const amount = parseFloat(document.getElementById('usdInput').value) || 0;
            const container = document.getElementById('results');
            const analysisBox = document.getElementById('nexusAnalysis');
            const conversionText = document.getElementById('conversionText');
            
            if (!window.currentRates || window.currentRates.length < 3) return;

            const bcvRate = window.currentRates[0].price;
            const eurRate = window.currentRates[1].price;
            const binanceRate = window.currentRates[2].price;

            // Renderizado de tarjetas Bs
            container.innerHTML = '';
            const icons = ['fa-university', 'fa-euro-sign', 'fa-bolt'];
            const colors = ['blue', 'indigo', 'red'];

            window.currentRates.forEach((item, index) => {
                const total = (amount * item.price).toLocaleString('es-VE', {minimumFractionDigits: 2});
                container.innerHTML += `
                    <div class="flex items-center justify-between p-4 bg-white border border-slate-50 rounded-3xl shadow-sm">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 bg-${colors[index] || 'slate'}-500 rounded-2xl flex items-center justify-center text-white">
                                <i class="fas ${icons[index] || 'fa-money-bill-wave'} text-xs"></i>
                            </div>
                            <div>
                                <h3 class="text-[9px] font-black text-slate-400 uppercase tracking-tighter">${item.name}</h3>
                                <p class="text-[10px] font-bold text-slate-800">Tasa: ${item.price.toFixed(2)}</p>
                            </div>
                        </div>
                        <p class="text-lg font-black text-slate-800">Bs. ${total}</p>
                    </div>
                `;
            });

            // LÓGICA DE CONVERSIÓN CON COMISIÓN (TÚ IDEA)
            if (binanceRate > 0) {
                analysisBox.classList.remove('hidden');
                
                // 1. Cuantos USDT necesito para cubrir el monto en Bs
                const rawUsdtNeeded = (amount * eurRate) / binanceRate;
                
                // 2. Costo Binance (7.5% sobre el envío)
                // Usamos la regla: Envío = Neto / (1 - 0.075)
                const totalWithFee = rawUsdtNeeded / 0.925;
                const feeCost = totalWithFee - rawUsdtNeeded;

                conversionText.innerHTML = `
                    <div class="text-left space-y-3">
                        <div class="flex justify-between items-end border-b border-slate-800 pb-2">
                            <span class="text-[11px] opacity-70 italic">Para entregar:</span>
                            <span class="font-bold text-blue-400">${amount.toFixed(2)} EUR</span>
                        </div>
                        <div class="flex justify-between items-end">
                            <span class="text-[11px] opacity-70 italic">Neto a cambiar:</span>
                            <span class="font-bold text-white">${rawUsdtNeeded.toFixed(2)} USDT</span>
                        </div>
                        <div class="flex justify-between items-end text-red-400">
                            <span class="text-[11px] opacity-70 italic">Comisión Binance (7.5%):</span>
                            <span class="font-bold">+ ${feeCost.toFixed(2)} USDT</span>
                        </div>
                        <div class="pt-2 mt-2 border-t border-blue-500/30">
                            <p class="text-[10px] text-blue-400 font-black uppercase tracking-widest text-center mb-1">Total a Enviar desde Origen</p>
                            <p class="text-3xl font-black text-center text-white">${totalWithFee.toFixed(2)} <span class="text-sm font-light opacity-50">USDT</span></p>
                        </div>
                    </div>
                `;
            }
        }

        document.getElementById('usdInput').addEventListener('input', render);
        window.onload = loadData;
    </script>
</body>
</html>
